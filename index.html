
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MIM</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#8E2DE2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="phone-frame">
  <!-- Приветственный экран -->
  <div class="screen welcome-screen active" id="welcomeScreen">
    <div class="logo"><i class="fas fa-comment-dots"></i></div>
    <div class="welcome-title">MIM</div>
    <p class="welcome-subtitle">Умный мессенджер с ИИ</p>
    <button class="btn" id="startAuthBtn">Начать общение</button>
  </div>

  <!-- Экран авторизации -->
  <div class="screen auth-screen" id="authScreen">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-lock"></i></div>
      <div class="auth-title">Вход</div>
    </div>
    <div class="auth-content">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="phone">Телефон</div>
        <div class="auth-tab" data-tab="login">Логин</div>
      </div>
      <div class="auth-form active" id="phoneForm">
        <div class="input-wrapper">
          <span>+7</span>
          <input type="tel" id="phoneInput" placeholder="999 123-45-67" value="9991234567">
        </div>
        <button class="btn" id="requestCodeBtn">Получить код</button>
        <div class="demo-hint">Демо: код появится на следующем экране</div>
      </div>
      <div class="auth-form" id="loginForm">
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUsername" placeholder="Логин" value="demo">
        </div>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Пароль" value="123456">
        </div>
        <button class="btn" id="loginBtn">Войти</button>
      </div>
      <p class="auth-footer"><a href="#" id="backToWelcomeLink">← На главную</a></p>
    </div>
  </div>

  <!-- Экран подтверждения кода -->
  <div class="screen code-screen" id="codeScreen">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-key"></i></div>
      <div class="auth-title">Код</div>
      <p id="codeHint">Мы отправили SMS</p>
    </div>
    <div class="auth-content">
      <div class="code-input-container">
        <input type="text" class="code-digit" maxlength="1">
        <input type="text" class="code-digit" maxlength="1">
        <input type="text" class="code-digit" maxlength="1">
        <input type="text" class="code-digit" maxlength="1">
      </div>
      <div class="timer" id="timer">Отправить повторно через 0:59</div>
      <div class="demo-hint">Демо-код: <strong id="demoCodeDisplay">1234</strong></div>
      <button class="btn" id="verifyCodeBtn">Подтвердить</button>
      <p class="auth-footer"><a href="#" id="backToPhoneLink">Изменить номер</a></p>
    </div>
  </div>

  <!-- Основной экран -->
  <div class="screen main-screen" id="mainScreen">
    <div id="tabContent" class="tab-content"></div>
    <div class="bottom-nav" id="bottomNav">
      <div class="nav-item active" data-tab="chats"><i class="fas fa-comment"></i><span>Чаты</span></div>
      <div class="nav-item" data-tab="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></div>
      <div class="nav-item" data-tab="settings"><i class="fas fa-sliders-h"></i><span>Настройки</span></div>
      <div class="nav-item" data-tab="profile"><i class="fas fa-user"></i><span>Профиль</span></div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
